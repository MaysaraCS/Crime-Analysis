services:
  - type: web
    name: crime-analysis-api
    runtime: python
    region: oregon   # change to "frankfurt" if your users are in Europe/Middle East
    plan: free       # change to "starter" for persistent disk support
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # you will paste this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      - key: PYTHON_VERSION
        value: 3.11.9